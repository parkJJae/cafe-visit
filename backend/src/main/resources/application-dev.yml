spring:
  datasource:
    url: jdbc:h2:mem:cafe_log;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true        # 쿼리 보기 좋게 포맷
        use_sql_comments: true  # 어떤 JPQL이 변환됐는지 주석으로 표시
    show-sql: true              # 쿼리 자체 출력

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace  # 파라미터 바인딩 값까지 표시